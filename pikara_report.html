<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Report">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232355e8'/%3E%3Cstop offset='1' stop-color='%235b44c9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='38' fill='url(%23g)'/%3E%3Ctext x='90' y='72' font-family='Helvetica Neue,Arial,sans-serif' font-size='13' font-weight='700' fill='white' text-anchor='middle' letter-spacing='3' opacity='0.7'%3EDAILY%3C/text%3E%3Ctext x='90' y='108' font-family='Helvetica Neue,Arial,sans-serif' font-size='38' font-weight='800' fill='white' text-anchor='middle' letter-spacing='-1'%3EDR%3C/text%3E%3Cline x1='44' y1='124' x2='136' y2='124' stroke='white' stroke-width='1.5' opacity='0.35'/%3E%3Ctext x='90' y='144' font-family='Helvetica Neue,Arial,sans-serif' font-size='11' font-weight='600' fill='white' text-anchor='middle' letter-spacing='2' opacity='0.55'%3EREPORT%3C/text%3E%3C/svg%3E">
<title>Daily Report</title>
<style>
  :root {
    --bg: #f2f4f8;
    --surface: #ffffff;
    --surface2: #eef0f6;
    --border: #e0e4ef;
    --accent: #3a6ef5;
    --text: #1a1a2e;
    --text2: #8a8aaa;
    --success: #1faa70;
    --yellow: #f59e0b;
    --yellow-bg: #fffbeb;
    --yellow-border: #fde68a;
    --radius: 16px;
    --font: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 4px;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title {
    font-size: 19px; font-weight: 800;
    letter-spacing: 0.04em; color: var(--accent);
  }
  .header-sub {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text2);
  }
  .day-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 10px 5px 14px;
    font-size: 12px; color: var(--text2); font-weight: 600;
  }
  .day-edit-btn {
    background: var(--border); border: none; border-radius: 50%;
    width: 20px; height: 20px; color: var(--text2);
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }
  .date-line { font-size: 12px; color: var(--text2); }

  /* MAIN */
  .main { padding: 16px 16px 130px; max-width: 600px; margin: 0 auto; }

  /* 前日カード */
  .prev-card {
    display: none; margin-bottom: 14px;
    background: var(--yellow-bg); border: 1px solid var(--yellow-border);
    border-radius: var(--radius); overflow: hidden;
  }
  .prev-card.show { display: block; }
  .prev-card-header {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; border-bottom: 1px solid var(--yellow-border);
  }
  .prev-card-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--yellow); flex: 1;
  }
  .prev-card-date { font-size: 11px; color: var(--text2); }
  .prev-card-body {
    padding: 10px 14px 12px; font-size: 13px;
    line-height: 1.7; color: var(--text);
    white-space: pre-wrap; word-break: break-all;
  }

  /* セクション */
  .section {
    margin-bottom: 10px; background: var(--surface);
    border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden;
  }
  .section-label {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px 8px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; color: var(--text2);
    text-transform: uppercase; border-bottom: 1px solid var(--border);
    background: #fafbff;
  }
  .section-label .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0; opacity: 0.6;
  }
  .field-row {
    display: flex; align-items: center;
    padding: 0 14px; border-bottom: 1px solid var(--border);
  }
  .field-row:last-child { border-bottom: none; }

  input[type="text"], textarea, select {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font);
    font-size: 15px; width: 100%; padding: 13px 0;
    -webkit-appearance: none;
  }
  textarea {
    resize: none; line-height: 1.65;
    padding: 13px 14px; min-height: 84px;
    font-size: 14px; display: block; width: 100%;
  }

  /* プルダウン共通 */
  .select-wrap { position: relative; flex: 1; }
  .select-wrap::after {
    content: '›'; position: absolute; right: 0; top: 50%;
    transform: translateY(-50%) rotate(90deg);
    color: var(--text2); font-size: 18px; pointer-events: none;
  }
  .store-select, .count-select {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font);
    font-size: 15px; width: 100%; padding: 13px 0;
    cursor: pointer; -webkit-appearance: none; appearance: none;
  }
  option { background: #ffffff; color: #1a1a2e; }

  /* 成約・スイング行 */
  .count-row { display: flex; }
  .count-field {
    flex: 1; display: flex; align-items: center;
    padding: 0 14px; border-right: 1px solid var(--border);
  }
  .count-field:last-child { border-right: none; }
  .count-label {
    font-size: 12px; color: var(--text2);
    white-space: nowrap; flex-shrink: 0;
  }
  .count-select {
    font-size: 15px !important; font-weight: 400;
    color: var(--text) !important;
    padding: 13px 0 13px 10px !important;
  }

  /* ボトムバー */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex; gap: 10px;
    max-width: 600px; margin: 0 auto;
  }
  .btn {
    flex: 1; padding: 17px; border-radius: var(--radius);
    border: none; font-family: var(--font);
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.12s; letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:active { transform: scale(0.97); opacity: 0.85; }
  .btn-reset {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); flex: 0 0 auto; padding: 17px 20px;
    font-size: 14px;
  }
  .btn-reset:active { transform: scale(0.97); }

  /* モーダル */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 300;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    width: calc(100% - 48px); max-width: 300px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }
  .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .modal-input-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .modal-input-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .modal-num-input {
    background: var(--surface2) !important; border: 1px solid var(--border) !important;
    border-radius: 8px !important; padding: 10px 14px !important;
    font-size: 20px !important; font-weight: 700 !important;
    color: var(--accent) !important; text-align: center; width: 80px !important;
    -moz-appearance: textfield;
  }
  .modal-num-input::-webkit-inner-spin-button,
  .modal-num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: 10px;
    border: none; font-family: var(--font);
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .modal-btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .modal-btn-ok { background: var(--accent); color: white; }

  /* 結果画面 */
  .result-screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 200; overflow-y: auto;
  }
  .result-screen.show { display: block; }
  .result-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px; position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .result-header h2 {
    font-size: 16px; font-weight: 700; color: var(--success);
    letter-spacing: 0.04em;
  }
  .back-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; font-family: var(--font);
  }
  .result-body { padding: 16px 16px 110px; max-width: 600px; margin: 0 auto; }
  .report-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    font-size: 14px; line-height: 1.9;
    white-space: pre-wrap; color: var(--text); word-break: break-all;
  }
  .share-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex; gap: 10px;
    max-width: 600px; margin: 0 auto;
  }
  .btn-line {
    background: #06c755; color: white;
  }
  .btn-copy {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); flex: 0 0 auto; padding: 17px 20px;
  }

  /* トースト */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--text); color: white;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; z-index: 400;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  ::placeholder { color: var(--text2); opacity: 0.5; }
  input:focus, textarea:focus, select:focus { outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="header-title">Daily Report</div>
      <div class="header-sub">竹口 / ピカラ光</div>
    </div>
    <div class="day-badge">
      <span id="dayBadgeText">— 日目</span>
      <button class="day-edit-btn" onclick="openDayModal()">✎</button>
    </div>
  </div>
  <div class="date-line" id="dateLine">—</div>
</div>

<div class="main">

  <div class="prev-card" id="prevCard">
    <div class="prev-card-header">
      <span class="prev-card-title">📌 前日の改善</span>
      <span class="prev-card-date" id="prevCardDate"></span>
    </div>
    <div class="prev-card-body" id="prevCardBody"></div>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>稼働店舗</div>
    <div class="field-row">
      <div class="select-wrap">
        <select class="store-select" id="store">
          <option value="">選択してください</option>
          <option value="沖浜店">沖浜店</option>
          <option value="阿南店">阿南店</option>
          <option value="藍住店">藍住店</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>成約 / スイング</div>
    <div class="count-row">
      <div class="count-field">
        <span class="count-label">成約</span>
        <div class="select-wrap">
          <select class="count-select" id="contracts">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div class="count-field">
        <span class="count-label">スイング</span>
        <div class="select-wrap">
          <select class="count-select" id="swing">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>振り返り（事実）</div>
    <textarea id="reflection" rows="4" placeholder="当日の行動全体・前日を踏まえて実施したことを簡潔に"></textarea>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>NG理由</div>
    <textarea id="ngReason" rows="3" placeholder="成約がある場合は「なし」と入力"></textarea>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>成約要因</div>
    <textarea id="successFactor" rows="3" placeholder="成約がある日のみ記入（0件の日は空欄可）"></textarea>
  </div>

  <div class="section">
    <div class="section-label"><span class="dot"></span>改善（次やること）</div>
    <textarea id="improvement" rows="3" placeholder="実施結果の評価・次の改善案"></textarea>
  </div>

</div>

<div class="bottom-bar">
  <button class="btn btn-reset" onclick="resetForm()">リセット</button>
  <button class="btn btn-primary" onclick="generateReport()">報告を作成</button>
</div>

<div class="modal-overlay" id="dayModal">
  <div class="modal">
    <h3>稼働日数を変更</h3>
    <div class="modal-input-row">
      <label>日目</label>
      <input type="number" class="modal-num-input" id="dayInput" min="1" max="31">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeDayModal()">キャンセル</button>
      <button class="modal-btn modal-btn-ok" onclick="saveDayFromModal()">保存</button>
    </div>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-header">
    <h2>報告完成 ✓</h2>
    <button class="back-btn" onclick="closeResult()">← 戻る</button>
  </div>
  <div class="result-body">
    <div class="report-box" id="reportText"></div>
  </div>
  <div class="share-bar">
    <button class="btn btn-copy" onclick="copyReport()">コピー</button>
    <button class="btn btn-line" onclick="shareReport()">LINEで共有</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'pikara_day_data';
const PREV_KEY    = 'pikara_prev_improvement';

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getJaDate() {
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + days[d.getDay()] + '）';
}

function getDayCount() {
  const today = getTodayStr();
  const m = today.slice(0,7);
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (!data.month || data.month !== m) data = { month: m, lastDate: null, count: 0 };
  return data.lastDate === today ? data.count : data.count + 1;
}

function saveDayCount(count) {
  const today = getTodayStr();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ month: today.slice(0,7), lastDate: today, count }));
}

function savePrevImprovement(text, dateStr) {
  localStorage.setItem(PREV_KEY, JSON.stringify({ text, date: dateStr }));
}

function loadPrevImprovement() {
  const today = getTodayStr();
  try {
    const data = JSON.parse(localStorage.getItem(PREV_KEY) || 'null');
    if (!data || !data.text || data.date === today) return;
    document.getElementById('prevCardBody').textContent = data.text;
    document.getElementById('prevCardDate').textContent = data.date.replace(/-/g,'/');
    document.getElementById('prevCard').classList.add('show');
  } catch(e) {}
}

let currentDayCount = 1;

function initHeader() {
  document.getElementById('dateLine').textContent = getJaDate();
  currentDayCount = getDayCount();
  document.getElementById('dayBadgeText').textContent = currentDayCount + '日目';
}

initHeader();
loadPrevImprovement();

function openDayModal() {
  document.getElementById('dayInput').value = currentDayCount;
  document.getElementById('dayModal').classList.add('show');
}
function closeDayModal() { document.getElementById('dayModal').classList.remove('show'); }
function saveDayFromModal() {
  const val = parseInt(document.getElementById('dayInput').value);
  if (!val || val < 1 || val > 31) { showToast('1〜31の数字を入力してください'); return; }
  currentDayCount = val;
  saveDayCount(val);
  document.getElementById('dayBadgeText').textContent = val + '日目';
  closeDayModal();
}
document.getElementById('dayModal').addEventListener('click', function(e) {
  if (e.target === this) closeDayModal();
});

function resetForm() {
  if (!confirm('入力内容をリセットしますか？')) return;
  document.getElementById('store').value = '';
  document.getElementById('contracts').value = '0';
  document.getElementById('swing').value = '0';
  document.getElementById('reflection').value = '';
  document.getElementById('ngReason').value = '';
  document.getElementById('successFactor').value = '';
  document.getElementById('improvement').value = '';
}

function generateReport() {
  const store         = document.getElementById('store').value;
  const contracts     = parseInt(document.getElementById('contracts').value) || 0;
  const swing         = parseInt(document.getElementById('swing').value) || 0;
  const reflection    = document.getElementById('reflection').value.trim();
  const ngReason      = document.getElementById('ngReason').value.trim();
  const successFactor = document.getElementById('successFactor').value.trim();
  const improvement   = document.getElementById('improvement').value.trim();

  if (!store)      { showToast('店舗を選択してください'); return; }
  if (!reflection) { showToast('振り返りを入力してください'); return; }
  if (!ngReason)   { showToast('NG理由を入力してください'); return; }

  const successLine = contracts > 0
    ? '【成約要因】\n・' + (successFactor || '（未記入）') + '\n'
    : '【成約要因】\n';

  const report =
    'お疲れ様です\n' +
    '退店報告：竹口\n' +
    '稼働店舗：' + store + '\n' +
    '稼働日数：' + currentDayCount + '日目\n' +
    '【結果】\n' +
    '・成約数：' + contracts + '\n' +
    '・スイング成約：' + swing + '\n' +
    '【振り返り（事実）】\n' +
    '・' + reflection + '\n' +
    '【NG理由】\n' +
    '・' + ngReason + '\n' +
    successLine +
    '【改善（次やること）】\n' +
    '・' + (improvement || '（未記入）') + '\n' +
    'お疲れ様でした。';

  document.getElementById('reportText').textContent = report;
  document.getElementById('resultScreen').classList.add('show');
  if (improvement) savePrevImprovement(improvement, getTodayStr());
  saveDayCount(currentDayCount);
}

function closeResult() { document.getElementById('resultScreen').classList.remove('show'); }

function copyReport() {
  const text = document.getElementById('reportText').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('コピーしました');
  }
}

function shareReport() {
  const text = document.getElementById('reportText').textContent;
  if (navigator.share) { navigator.share({ text }).catch(()=>{}); }
  else { copyReport(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
